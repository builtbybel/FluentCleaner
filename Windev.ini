; FluentCleaner — Developer Tools Pack
; Caches and temporary files generated by common development tools.
; All entries target regenerable caches only and no source files, no installed packages.

[Android Studio Caches *]
Section=Developers
DetectFile=%LocalAppData%\Google\AndroidStudio*
FileKey1=%LocalAppData%\Google\AndroidStudio*\*Cache|*|RECURSE
FileKey2=%UserProfile%\.android\cache|*|RECURSE

[Cargo Package Cache (Rust) *]
Section=Developers
DetectFile=%UserProfile%\.cargo
FileKey1=%UserProfile%\.cargo\registry\cache|*|RECURSE
FileKey2=%UserProfile%\.cargo\registry\src|*|RECURSE
FileKey3=%UserProfile%\.cargo\git\checkouts|*|RECURSE

[Docker Logs *]
Section=Developers
DetectFile=%LocalAppData%\Docker
FileKey1=%LocalAppData%\Docker\log|*|RECURSE
FileKey2=%AppData%\Docker\log|*|RECURSE

[Gradle Build Cache *]
Section=Developers
DetectFile=%UserProfile%\.gradle
FileKey1=%UserProfile%\.gradle\caches|*|RECURSE
FileKey2=%UserProfile%\.gradle\daemon\*|*.out.log
FileKey3=%UserProfile%\.gradle\wrapper\dists|*.zip

[Go Module Download Cache *]
Section=Developers
DetectFile=%UserProfile%\go\pkg\mod\cache
FileKey1=%UserProfile%\go\pkg\mod\cache\download\sumdb|*|RECURSE
FileKey2=%UserProfile%\go\pkg\mod\cache\download\*|*.zip

[JetBrains IDE Logs *]
Section=Developers
DetectFile=%AppData%\JetBrains
FileKey1=%AppData%\JetBrains\*\log|*|RECURSE

[JetBrains Toolbox Cache *]
Section=Developers
DetectFile=%LocalAppData%\JetBrains\Toolbox
FileKey1=%LocalAppData%\JetBrains\Toolbox\logs|*|RECURSE
FileKey2=%LocalAppData%\JetBrains\Toolbox\cache|*|RECURSE

[npm Cache *]
Section=Developers
DetectFile=%LocalAppData%\npm-cache
FileKey1=%LocalAppData%\npm-cache|*|RECURSE

[NuGet HTTP Cache *]
Section=Developers
DetectFile=%LocalAppData%\NuGet
FileKey1=%LocalAppData%\NuGet\Cache|*|RECURSE
FileKey2=%LocalAppData%\NuGet\v3-cache|*|RECURSE
FileKey3=%Temp%\NuGetScratch|*|RECURSE

[pnpm Cache *]
Section=Developers
DetectFile=%LocalAppData%\pnpm
FileKey1=%LocalAppData%\pnpm\store|*|RECURSE

[WinGet Download Cache *]
Section=Developers
DetectFile=%LocalAppData%\Packages\Microsoft.DesktopAppInstaller_*
FileKey1=%LocalAppData%\Packages\Microsoft.DesktopAppInstaller_*\LocalCache|*|RECURSE
FileKey2=%LocalAppData%\Packages\Microsoft.DesktopAppInstaller_*\LocalState\Microsoft\WinGet|*.log

[Yarn Cache *]
Section=Developers
DetectFile=%LocalAppData%\Yarn
FileKey1=%LocalAppData%\Yarn\Cache|*|RECURSE
