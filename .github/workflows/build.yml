name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore FluentCleaner/FluentCleaner.csproj

      - name: Build
        run: dotnet build FluentCleaner/FluentCleaner.csproj --configuration Release --no-restore -p:Platform=x64

